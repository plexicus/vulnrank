name: Batch CVE Curation

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC (after weekly_ranking)
  workflow_dispatch:
    inputs:
      max_cves:
        description: "Max CVEs to curate in this run"
        required: false
        default: "50"
      force:
        description: "Re-curate already-curated CVEs"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: curation-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write    # for Workload Identity Federation

environment: curation

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}

      - name: Run batch curation
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_SYSTEM_PROMPT: ${{ secrets.MINIMAX_SYSTEM_PROMPT }}
          HETZNER_S3_KEY: ${{ secrets.HETZNER_S3_KEY }}
          HETZNER_S3_SECRET: ${{ secrets.HETZNER_S3_SECRET }}
          HETZNER_S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          HETZNER_S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVDAPIKEY: ${{ secrets.NVDAPIKEY }}
        run: |
          python - <<'EOF'
          import json, glob, os, sys
          from curator.storage.index import MasterIndex
          from curator.mark_curated import curate_one, save_public_status
          from collectors.cisa_kev import load_cve_set
          from collectors.epss import load_epss_map

          MAX_CVES = int(os.environ.get("MAX_CVES", "${{ inputs.max_cves || '50' }}"))
          FORCE = os.environ.get("FORCE", "${{ inputs.force || 'false' }}").lower() == "true"

          # Load master index
          master = MasterIndex()
          master.load()

          kev_set = load_cve_set()
          epss_map = load_epss_map()

          # Collect candidates: critical/high priority CVEs not yet curated
          candidates = []
          for path in glob.glob("data/rankings/*.json"):
              with open(path) as f:
                  entries = json.load(f)
              for entry in entries:
                  priority = entry.get("curation", {}).get("priority", "low")
                  if priority not in ("critical", "high"):
                      continue
                  eco = entry["ecosystem"]
                  pkg = entry["name"]
                  repo = entry.get("github_repo")
                  default_ver = entry.get("default_version")
                  for cve_id in entry.get("threat", {}).get("associated_cves", []):
                      decision = master.decide(cve_id, eco, pkg, force=FORCE)
                      if decision in ("process", "retry", "reprocess"):
                          epss_score = epss_map.get(cve_id, 0.0)
                          in_kev = cve_id in kev_set
                          candidates.append({
                              "cve_id": cve_id, "ecosystem": eco, "package": pkg,
                              "github_repo": repo, "default_version": default_ver,
                              "epss": epss_score, "in_kev": in_kev,
                          })

          # Sort: KEV first, then EPSS descending
          candidates.sort(key=lambda x: (not x["in_kev"], -x["epss"]))
          candidates = candidates[:MAX_CVES]
          print(f"Curating {len(candidates)} CVEs")

          results = {"curated": 0, "skipped": 0, "failed": 0}
          for c in candidates:
              r = curate_one(
                  cve_id=c["cve_id"],
                  ecosystem=c["ecosystem"],
                  package=c["package"],
                  vuln_version=None,
                  fix_version=None,
                  github_repo=c.get("github_repo"),
                  master_index=master,
                  force=FORCE,
              )
              results[r["status"] if r["status"] in results else "failed"] += 1

          print(f"Results: {results}")

          # Save master index (S3 + Drive)
          master.save()

          # Update public status
          save_public_status(master)

          if results["failed"] > len(candidates) * 0.1:
              print(f"ERROR: failure rate exceeds 10%", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Commit public curation status
        run: |
          git config user.name "vulnrank-bot"
          git config user.email "bot@plexicus.ai"
          git add data/curation_status/
          git diff --staged --quiet || git commit -m "chore: curation status update $(date -u +%Y-%m-%d)"
          git push
