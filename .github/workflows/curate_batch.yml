name: Batch CVE Curation

on:
  schedule:
    - cron: "0 4 * * 1"  # Monday — balanced: 60% critical/high + 40% legacy
    - cron: "0 4 * * 4"  # Thursday — legacy sweep: 20% critical/high + 80% usage-sorted
  workflow_dispatch:
    inputs:
      max_cves:
        description: "Max CVEs to curate in this run"
        required: false
        default: "100"
      primary_fraction:
        description: "Fraction for critical/high queue (0.0–1.0)"
        required: false
        default: "0.6"
      force:
        description: "Re-curate already-curated CVEs"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: curation-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

# environment: curation  # Uncomment to require maintainer approval before each run

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}

      - name: Run batch curation
        run: python scripts/run_batch_curation.py
        env:
          MAX_CVES: ${{ inputs.max_cves || '100' }}
          FORCE: ${{ inputs.force || 'false' }}
          # Thursday schedule flips to legacy-heavy mode automatically.
          # Manual dispatch can override via primary_fraction input.
          PRIMARY_FRACTION: ${{ inputs.primary_fraction || (github.event.schedule == '0 4 * * 4' && '0.2' || '0.6') }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_SYSTEM_PROMPT: ${{ secrets.MINIMAX_SYSTEM_PROMPT }}
          HETZNER_S3_KEY: ${{ secrets.HETZNER_S3_KEY }}
          HETZNER_S3_SECRET: ${{ secrets.HETZNER_S3_SECRET }}
          HETZNER_S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          HETZNER_S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVDAPIKEY: ${{ secrets.NVDAPIKEY }}
