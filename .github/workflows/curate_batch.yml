name: Batch CVE Curation

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      max_cves:
        description: "Max CVEs to curate in this run"
        required: false
        default: "50"
      force:
        description: "Re-curate already-curated CVEs"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: curation-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

environment: curation

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}

      - name: Run batch curation
        run: python scripts/run_batch_curation.py
        env:
          MAX_CVES: ${{ inputs.max_cves || '50' }}
          FORCE: ${{ inputs.force || 'false' }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_SYSTEM_PROMPT: ${{ secrets.MINIMAX_SYSTEM_PROMPT }}
          HETZNER_S3_KEY: ${{ secrets.HETZNER_S3_KEY }}
          HETZNER_S3_SECRET: ${{ secrets.HETZNER_S3_SECRET }}
          HETZNER_S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          HETZNER_S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVDAPIKEY: ${{ secrets.NVDAPIKEY }}

      - name: Commit public curation status
        run: |
          git config user.name "vulnrank-bot"
          git config user.email "bot@plexicus.ai"
          git add data/curation_status/
          git diff --staged --quiet || git commit -m "chore: curation status update $(date -u +%Y-%m-%d)"
          git push
