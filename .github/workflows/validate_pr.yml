name: Validate PR

on:
  pull_request:
    paths:
      - "data/rankings/**"
      - "data/curation_status/**"
      - "config/weights.yaml"
      - "config/seed_packages.yaml"
      - "schemas/**"
      - "**.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate ranking JSON files
        run: |
          python - <<'EOF'
          import glob, json, sys
          import jsonschema

          with open("schemas/library_rank.schema.json") as f:
              schema = json.load(f)

          errors = []
          for path in glob.glob("data/rankings/*.json"):
              with open(path) as f:
                  entries = json.load(f)
              if not isinstance(entries, list):
                  errors.append(f"{path}: must be a JSON array")
                  continue
              for i, entry in enumerate(entries):
                  try:
                      jsonschema.validate(entry, schema)
                  except jsonschema.ValidationError as e:
                      errors.append(f"{path}[{i}]: {e.message}")

          if errors:
              print("Ranking validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"All ranking files valid")
          EOF

      - name: Validate curation status index
        run: |
          python - <<'EOF'
          import json, sys, os
          import jsonschema

          path = "data/curation_status/index.json"
          if not os.path.exists(path):
              print("No curation status index found, skipping")
              sys.exit(0)

          with open("schemas/curation_status.schema.json") as f:
              schema = json.load(f)
          with open(path) as f:
              data = json.load(f)

          # Ensure WARNING field is present
          if "WARNING" not in data:
              print("ERROR: curation_status/index.json missing WARNING field")
              sys.exit(1)

          try:
              jsonschema.validate(data, schema)
              print("Curation status index valid")
          except jsonschema.ValidationError as e:
              print(f"Curation status validation error: {e.message}")
              sys.exit(1)
          EOF

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Validate weights.yaml sums to 1.0
        run: |
          python - <<'EOF'
          import yaml, sys
          with open("config/weights.yaml") as f:
              cfg = yaml.safe_load(f)
          w = cfg["weights"]
          total = sum(w.values())
          if abs(total - 1.0) > 0.001:
              print(f"ERROR: weights sum to {total}, must be 1.0")
              sys.exit(1)
          tw = cfg["threat_weights"]
          ttotal = sum(tw.values())
          if abs(ttotal - 1.0) > 0.001:
              print(f"ERROR: threat_weights sum to {ttotal}, must be 1.0")
              sys.exit(1)
          print("Weights valid")
          EOF
