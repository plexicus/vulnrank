name: Daily Threat Intelligence Refresh

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  threats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch CISA KEV and EPSS, recompute scores
        run: python scripts/run_threats.py

      - name: Commit threat data
        run: |
          git config user.name "vulnrank-bot"
          git config user.email "bot@plexicus.ai"
          git add data/threats/ data/rankings/
          git diff --staged --quiet || git commit -m "chore: threat intel refresh $(date -u +%Y-%m-%d)"
          git push
