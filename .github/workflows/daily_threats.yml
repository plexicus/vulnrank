name: Daily Threat Intelligence Refresh

on:
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  threats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch CISA KEV
        run: python -c "
from collectors.cisa_kev import fetch, save
save(fetch())
"

      - name: Fetch EPSS top 5000
        run: python -c "
from collectors.epss import fetch, save
save(fetch())
"

      - name: Recompute threat scores
        run: python -c "
from ranker.threat_recompute import recompute_all
recompute_all()
"

      - name: Commit threat data
        run: |
          git config user.name "vulnrank-bot"
          git config user.email "bot@plexicus.ai"
          git add data/threats/ data/rankings/
          git diff --staged --quiet || git commit -m "chore: threat intel refresh $(date -u +%Y-%m-%d)"
          git push
