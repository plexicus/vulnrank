name: Curate Single CVE

on:
  workflow_dispatch:
    inputs:
      cve_id:
        description: "CVE ID (e.g. CVE-2021-44228)"
        required: true
      ecosystem:
        description: "Ecosystem (npm/pypi/go/maven/cargo/nuget/rubygems)"
        required: true
      package:
        description: "Package name (Maven: groupId:artifactId)"
        required: true
      vuln_version:
        description: "Vulnerable version tag"
        required: false
      fix_version:
        description: "Fixed version tag"
        required: false
      github_repo:
        description: "GitHub repo owner/repo"
        required: false
      force:
        description: "Re-curate even if already curated"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: curation-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

# environment: curation  # Uncomment to require maintainer approval before each run

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}

      - name: Curate CVE
        run: python scripts/run_single_curation.py
        env:
          CVE_ID: ${{ inputs.cve_id }}
          ECOSYSTEM: ${{ inputs.ecosystem }}
          PACKAGE: ${{ inputs.package }}
          VULN_VERSION: ${{ inputs.vuln_version }}
          FIX_VERSION: ${{ inputs.fix_version }}
          GITHUB_REPO: ${{ inputs.github_repo }}
          FORCE: ${{ inputs.force }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_SYSTEM_PROMPT: ${{ secrets.MINIMAX_SYSTEM_PROMPT }}
          HETZNER_S3_KEY: ${{ secrets.HETZNER_S3_KEY }}
          HETZNER_S3_SECRET: ${{ secrets.HETZNER_S3_SECRET }}
          HETZNER_S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          HETZNER_S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
